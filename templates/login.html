
{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">

    <div class="col-md-6 col-lg-5">

        <div class="card glass-card border-0 shadow-lg p-4 p-md-5">

            <!-- Header -->
            <div class="text-center mb-4">

                <div class="mb-3">
                    <i class="bi bi-box-arrow-in-right text-info" style="font-size:4rem;"></i>
                </div>

                <h2 class="fw-bold text-white">
                    Welcome Back
                </h2>

                <p class="text-white">
                    Sign in to access your StartupHub dashboard.
                </p>

            </div>


            <!-- Login Form -->
            <form method="POST">

                <!-- Email -->
                <div class="mb-3">

                    <label class="form-label text-white">
                        EMAIL ADDRESS
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control form-control-lg rounded-3"
                        placeholder="example@gmail.com"
                        required>

                </div>


                <!-- Password -->
                <div class="mb-4">

                    <label class="form-label text-white">
                        PASSWORD
                    </label>

                    <div class="input-group">

                        <input
                            type="password"
                            name="password"
                            id="password"
                            class="form-control form-control-lg rounded-start-3"
                            placeholder="Enter your password"
                            required>

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()">

                            <i class="bi bi-eye" id="eyeIcon"></i>

                        </button>

                    </div>

                </div>


                <!-- Login Button -->
                <button
                    type="submit"
                    class="btn btn-success btn-lg w-100 rounded-3">

                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Sign In

                </button>

            </form>


            <!-- Register Link -->
            <div class="text-center mt-4">

                <p class="text-white">

                    New to StartupHub?

                    <a href="{{ url_for('register') }}"
                       class="text-info text-decoration-none fw-bold">

                        Create an account

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>


<script>

function togglePassword()
{
    let password = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if(password.type === "password")
    {
        password.type = "text";
        icon.className = "bi bi-eye-slash";
    }
    else
    {
        password.type = "password";
        icon.className = "bi bi-eye";
    }
}

</script>

{% endblock %}
