{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg p-4 bg-white border-0 rounded-3" style="max-width: 600px; margin: 0 auto;">
        <h2 class="text-dark fw-bold mb-1">Apply to {{ startup.startup_name if startup else 'Company' }}</h2>
        <p class="text-muted mb-4">{{ startup.description if startup else '' }}</p>
        <hr class="mb-4">

        <form method="POST">
            <div class="mb-3">
                <label for="cover_letter" class="form-label text-dark fw-semibold">Why do you want to join us?</label>
                <textarea class="form-control" id="cover_letter" name="cover_letter" rows="5" required placeholder="Tell the company about your interest..."></textarea>
            </div>
            
            <div class="mb-4">
                <label for="portfolio" class="form-label text-dark fw-semibold">Portfolio / Project Link</label>
                <input type="url" class="form-control" id="portfolio" name="portfolio" placeholder="https://github.com/yourprofile">
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success py-2">Submit Application</button>
                <a href="{{ url_for('startups') }}" class="btn btn-outline-secondary py-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
