{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="glass-card p-5">

            <h1 class="text-center text-success mb-4">
                <i class="bi bi-envelope-fill"></i>
                Contact Us
            </h1>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Message
                    </label>

                    <textarea name="message"
                              rows="6"
                              class="form-control"
                              required></textarea>
                </div>

                <button type="submit"
                        class="btn gradient-btn w-100 py-3">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
